<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MarineMind{% endblock %}</title>
    <style>
        :root {
            --primary: #0f4c81;
            --primary-dark: #0a3259;
            --primary-light: #1a6bb5;
            --accent: #00b4d8;
            --bg-dark: #0b1929;
            --bg-card: #132f4c;
            --bg-input: #1a3a5c;
            --text-primary: #e3f2fd;
            --text-secondary: #90caf9;
            --text-muted: #64b5f6;
            --border: #1e4976;
            --success: #4caf50;
            --warning: #ff9800;
            --error: #f44336;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-layout {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-header .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .sidebar-header .subtitle {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .new-chat-btn {
            margin: 16px 20px;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .new-chat-btn:hover { background: var(--primary-light); }

        .nav-links {
            padding: 8px 12px;
        }

        .nav-links a {
            display: block;
            padding: 10px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 14px;
            transition: background 0.15s;
        }

        .nav-links a:hover { background: var(--bg-input); }
        .nav-links a.active { background: var(--primary); color: white; }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .session-item {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
        }

        .session-item:hover { background: var(--bg-input); }
        .session-item.active { background: var(--primary); color: white; }

        /* Main content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
        }

        .topbar h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-rag { background: #1b5e20; color: #a5d6a7; }
        .badge-internet { background: #e65100; color: #ffcc80; }
        .badge-hybrid { background: #4a148c; color: #ce93d8; }
        .badge-greeting { background: #01579b; color: #81d4fa; }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    {% block body %}{% endblock %}
</body>
</html>
